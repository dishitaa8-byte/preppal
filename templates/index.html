
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepPal - AI Exam Preparation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- HUD Corner Decorations -->
    <div class="hud-corner hud-corner-tl"></div>
    <div class="hud-corner hud-corner-tr"></div>
    <div class="hud-corner hud-corner-bl"></div>
    <div class="hud-corner hud-corner-br"></div>
    
    <!-- PREPPAL Heading -->
    <h1 class="heading">PREPPAL</h1>

    <!-- Welcome Text (First Visit Only) -->
    <p class="welcome-text" id="welcome-text">Welcome, Future Hero.</p>

    <!-- Tagline -->
    <p class="tagline" id="tagline">Train Like a Hero. Prepare Like a Pro.</p>

    <!-- Main Container -->
    <div class="container">
        <!-- Action Section (Cards + Button) -->
    <div class="action-section" id="action-section">
        <!-- Combined Input Card -->
        <div class="geometric-card">
            <div class="combined-input-wrapper">
                <button class="upload-btn" id="upload-btn" title="Attach PDF">
                    �
                </button>
                <input 
                    type="text" 
                    class="combined-topic-input" 
                    id="topic-input"
                    placeholder="Enter a topic or attach a PDF..."
                >
                <!-- Hidden File Input -->
                <input type="file" id="file-input" accept=".pdf" style="display: none;">
            </div>
            <!-- File Display (Hidden by default) -->
            <div class="file-display" id="file-display" style="display: none;">
                <span class="file-name" id="file-name"></span>
                <button class="remove-file-btn" id="remove-file-btn" title="Remove file">✕</button>
            </div>
        </div>

        <!-- Training Mode Selection -->
        <div class="geometric-card mode-selection-card">
            <label class="input-label">Training Mode</label>
            <div class="mode-options">
                <label class="mode-option">
                    <input type="radio" name="mode" value="written" checked>
                    <span class="mode-radio"></span>
                    <span class="mode-text">Written Viva</span>
                </label>
                <label class="mode-option">
                    <input type="radio" name="mode" value="mcq">
                    <span class="mode-radio"></span>
                    <span class="mode-text">MCQ Quiz</span>
                </label>
            </div>
        </div>

        <!-- Start Prep Button -->
        <button class="start-btn" id="start-btn">
            <span class="btn-icon">⚡</span>
            Start Prep
        </button>
    </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        © 2026 PrepPal | Version 1.0
    </footer>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
