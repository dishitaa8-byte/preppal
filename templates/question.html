<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepPal - Viva Question</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="hud-corner hud-corner-tl"></div>
    <div class="hud-corner hud-corner-tr"></div>
    <div class="hud-corner hud-corner-bl"></div>
    <div class="hud-corner hud-corner-br"></div>

    <div class="container" id="question-container">
        <div class="progress-bar-container">
            <div class="progress-text" id="progress-text">Question 1 of 5</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="geometric-card question-card" id="question-card">
            <div class="question-text" id="question-text">Loading question...</div>
        </div>

        <div class="geometric-card answer-card" id="answer-card">
            <label class="input-label" for="answer-input">Your Answer</label>
            <textarea
                id="answer-input"
                class="answer-input"
                placeholder="Type your answer here..."
                disabled
            ></textarea>
            <div class="char-counter" id="char-counter">0 characters</div>
        </div>

        <div class="geometric-card mcq-card" id="mcq-card" style="display: none;">
            <label class="input-label">Select Your Answer</label>
            <div class="mcq-options" id="mcq-options">
                <!-- MCQ options will be dynamically inserted here -->
            </div>
        </div>

        <button class="start-btn" id="submit-btn" disabled>
            <span class="btn-icon">✓</span> Submit Answer
        </button>

        <div class="evaluation-result" id="evaluation-result" style="display: none;">
            <div class="geometric-card">
                <div class="evaluation-header">
                    <h3 class="evaluation-title">Score</h3>
                    <div class="score-display">
                        <span class="score-value" id="score-value">0</span>
                        <span class="score-divider">/</span>
                        <span class="score-max">5</span>
                    </div>
                </div>
                <div class="evaluation-section">
                    <h4 class="evaluation-label">Feedback</h4>
                    <p class="evaluation-text" id="feedback-text"></p>
                </div>
                <div class="evaluation-section">
                    <h4 class="evaluation-label">Ideal Answer</h4>
                    <p class="evaluation-text ideal-text" id="ideal-answer-text"></p>
                </div>
                <button class="start-btn" id="next-question-btn">
                    <span class="btn-icon">→</span> Next Question
                </button>
            </div>
        </div>
    </div>

    <div class="loading" id="loading" style="display: none;">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Evaluating your answer...</div>
    </div>

    <script>
        const SESSION_ID = "{{ session_id }}";
    </script>
    <script src="{{ url_for('static', filename='js/question.js') }}"></script>
</body>
</html>
